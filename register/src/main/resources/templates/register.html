<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejestracja</title>
    <link rel="icon" th:href="@{/images/chart.ico}" type="image/x-icon">

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/button.css}">
    <script th:src="@{/js/script.js}" defer></script>

</head>
<body>
<div class="loader"></div>
<main>
<div id="register-window" class="login active">
    <form id="register-form" th:action="@{/register}" method="post">
                <h1 class="loginTitle">Rejestracja</h1>
        <div class="inputsRow">
            <div class="field">
                <label for="firstName">Imię</label>
                <input type="text" name="firstName" id="firstName" required>
            </div>
            <div class="field">
                <label for="lastName">Nazwisko</label>
                <input type="text" name="lastName" id="lastName" required>
            </div>
        </div>

        <div class="inputsRow">
            <div class="field">
                <label for="username">Login</label>
                <input type="text" name="username" id="username" required>
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input type="text" name="email" id="email" required>
            </div>
        </div>

        <!-- Role -->
        <label>Rola</label>
        <div class="radio-group">
            <div class="radio-item">
                <input type="radio" id="admin" name="id_role" value="1" required>
                <label for="admin">Admin</label>
            </div>
            <div class="radio-item">
                <input type="radio" id="manager" name="id_role" value="2" required>
                <label for="manager">Kierownik</label>
            </div>
            <div class="radio-item">
                <input type="radio" id="coordinator" name="id_role" value="3" required>
                <label for="coordinator">Koordynator</label>
            </div>
            <div class="radio-item">
                <input type="radio" id="uzytkownik" name="id_role" value="4" required>
                <label for="uzytkownik">Użytkownik</label>
            </div>
        </div>


        <div class="btnContainer">
                <button type="submit" class="mainBtn">Utwórz konto</button> <br/>
            </div>

            <div class="bottomLink">
                <label>Masz już konto? -- <a th:href="@{/login}">Zaloguj się</a></label>
            </div>
    </form>

</div>
</main>

<footer>
    <p>&copy; Statystyka 2025</p>
</footer>

</body>
</html>
