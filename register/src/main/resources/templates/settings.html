<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ustawienia</title>
    <link rel="icon" th:href="@{/images/chart.ico}" type="image/x-icon">

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

        <link rel="stylesheet" th:href="@{/css/sidebarCSS.css}">
        <link rel="stylesheet" th:href="@{/css/style.css}">
        <link rel="stylesheet" th:href="@{/css/settings.css}">
        <link rel="stylesheet" th:href="@{/css/button.css}">

    <script th:src="@{/js/json.js}" defer></script>
        <script th:src="@{/js/script.js}" defer></script>

<!--        <link rel="stylesheet" href="../static/css/sidebarCSS.css">-->
<!--        <link rel="stylesheet" href="../static/css/style.css">-->
<!--        <link rel="stylesheet" href="../static/css/settings.css">-->
<!--        <script src="../static/js/json.js" defer></script>-->
<!--        <script src="../static/js/script.js" defer></script>-->


</head>

<body>

<div class="sidebar">
    <div class="top">
        <div class="logo">
            <i class='bx bx-bar-chart-alt-2'></i>
            <span>Statystyka</span>
        </div>
        <i class="bx bx-menu" id="btn"></i>

        <div class="user">
            <img src="" alt="User Image" class="user-img" id="user-avatar">
            <div class="information">
                <p class="bold"></p>
                <p class="role"></p>
            </div>
        </div>

        <ul>
            <li sec:authorize="hasAnyRole('ADMIN', 'COORDINATOR', 'USER')">
                <a th:href="@{/index}">
                    <i class="bx bx-home"></i>
                    <span class="nav-item">Dashboard</span>
                </a>
                <span class="tooltip">Dashboard</span>
            </li>
            <li sec:authorize="hasAnyRole('ADMIN', 'COORDINATOR', 'USER')">
                <a th:href="@{/processes}">
                    <i class="bx bx-windows"></i>
                    <span class="nav-item">Procesy</span>
                </a>
                <span class="tooltip">Procesy</span>
            </li>
            <li>
                <a th:href="@{/settings}">
                    <i class="bx bx-cog"></i>
                    <span class="nav-item">Ustawienia</span>
                </a>
                <span class="tooltip">Ustawienia</span>
            </li>
            <li class="notification-item">
                <a th:href="@{/notifications}">
                    <i class='bx bx-message'></i>
                    <span class="nav-item">Powiadomienia</span>
                    <span id="notification-counter" class="notification-counter" style="display: none;">0</span>
                </a>
                <span class="tooltip">Powiadomienia</span>
            </li>
            <li sec:authorize="hasAnyRole('ADMIN', 'COORDINATOR', 'MANAGER')">
                <a th:href="@{/efficiency}">
                    <i class="bx bx-stats"></i>
                    <span class="nav-item">Efektywność</span>
                </a>
                <span class="tooltip">Efektywność</span>
            </li>
            <li th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                <a th:href="@{/adminPanel}">
                    <i class='bx bx-user-check'></i>
                    <span class="nav-item">Panel Admina</span>
                </a>
                <span class="tooltip">Panel Admina</span>
            </li>
        </ul>
    </div>
    <ul>
        <li>
            <a th:href="@{/logout}">
                <i class="bx bx-log-out"></i>
                <span class="nav-item">Wyloguj</span>
            </a>
            <span class="tooltip">Wyloguj</span>
        </li>
    </ul>
</div>

<div class="main-content">

    <div class="popup">
        <!-- Komunikat dynamiczny -->
        <div id="popup-userMessage" class="userMessage" style="display: none;">
            <span></span>
            <i class='bx bx-x-circle' onclick="this.parentElement.style.display='none'"></i>
        </div>
    </div>

    <div class="loader"></div>

    <header class="title-container">
        <h1>Ustawienia</h1>
        <span id="currentDate"></span>
    </header>

    <div class="content-wrapper">
        <!-- Sekcja lewa -->
        <section class="left">
            <h2>Zmiana hasła</h2>
            <form method="POST" th:action="@{/api/user/changePasswordInSettings}" id="changePasswordForm">
                <div class="inputs">
                    <div class="input-box">
                        <label for="settings-current-password">Aktualne hasło</label>
                        <input type="password" id="settings-current-password" name="settingsCurrentPassword" required>
                        <i class="fa-solid fa-eye-slash" id="show-password"></i>
                    </div>
                    <div class="input-box">
                        <label for="settings-new-password">Nowe hasło</label>
                        <input type="password" id="settings-new-password" name="settingsNewPassword" required>
                        <i class="fa-solid fa-eye-slash" id="show-new-password"></i>
                    </div>
                    <div class="input-box">
                        <label for="settings-confirm-password">Potwierdź nowe hasło</label>
                        <input type="password" id="settings-confirm-password" name="settingsConfirmPassword" required>
                        <i class="fa-solid fa-eye-slash" id="show-confirm-password"></i>
                    </div>
                </div>
                <div class="btnContainer">
                    <button type="submit" class="mainBtn">Zmień hasło</button>
                </div>
            </form>
        </section>

        <!-- Sekcja prawa -->
        <section class="right">
            <h2>Dodatkowe opcje</h2>
            <div class="button-group">
                <a th:href="@{/profile}" class="mainBtn">Profil</a>
                <a th:href="@{/notifications}" class="mainBtn">Powiadomienia</a>
                <a th:href="@{/logout}" class="mainBtn">Wyloguj się</a>
            </div>
        </section>
    </div>
</div>


<input type="hidden" id="userId" th:value="${userId != null ? userId : ''}">

</body>

</html>
