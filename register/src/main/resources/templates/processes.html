<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" th:href="@{/css/sidebarCSS.css}">
    <script th:src="@{/js/json.js}" defer></script>
    <script th:src="@{/js/script.js}" defer></script>
    <script th:src="@{/js/processes.js}" defer></script>

</head>

<body>

<div class="sidebar">
    <div class="top">
        <div class="logo">
            <i class='bx bx-bar-chart-alt-2'></i>
            <span>Statystyka</span>
        </div>
        <i class="bx bx-menu" id="btn"></i>

        <div class="user">
            <img src="" alt="User Image" class="user-img">
            <div>
                <p class="bold"></p>
                <p class="role"></p>
            </div>
        </div>

        <ul>
            <li>
                <a th:href="@{/index}">
                    <i class="bx bx-home"></i>
                    <span class="nav-item">Dashboard</span>
                </a>
                <span class="tooltip">Dashboard</span>
            </li>
            <li>
                <a th:href="@{/processes}">
                    <i class="bx bx-windows"></i>
                    <span class="nav-item">Procesy</span>
                </a>
                <span class="tooltip">Procesy</span>
            </li>
            <li>
                <a th:href="@{/efficiency}">
                    <i class="bx bx-stats"></i>
                    <span class="nav-item">Efektywność</span>
                </a>
                <span class="tooltip">Efektywność</span>
            </li>
            <li>
                <a th:href="@{/settings}">
                    <i class="bx bx-cog"></i>
                    <span class="nav-item">Ustawienia</span>
                </a>
                <span class="tooltip">Ustawienia</span>
            </li>
        </ul>
    </div>
    <ul>
        <li>
            <a th:href="@{/logout}">
                <i class="bx bx-log-out"></i>
                <span class="nav-item">Wyloguj</span>
            </a>
            <span class="tooltip">Wyloguj</span>
        </li>
    </ul>
</div>

<div class="main-content">

    <div class="loader"></div>

    <div class="container">
        <h1>Procesy</h1>
    </div>

    <div class="content-wrapper">
        <!-- Lewy kontener -->
        <div class="left-container">
            <h2>Wszystkie procesy</h2>
            <ul id="left-list">
                <!-- Elementy zostaną tu dodane -->
            </ul>
        </div>

        <!-- Przyciski na środku -->
        <div class="all-button-container">
            <div class="button-container">
                <button id="move-right">Dodaj &rarr;</button>
                <button id="move-left">&larr; Usuń</button>
            </div>
            <div class="check-all-container">
                <button id="move-right-all">Zaznacz wszystkie</button>
                <button id="move-left-all">Odznacz wszystkie</button>
            </div>
            <div class="save-btn-container">
                <button id="save"><i class='bx bx-save'></i> Zapisz</button>
            </div>
        </div>
        <!-- Prawy kontener -->
        <div class="right-container">
            <h2>Ulubione</h2>
            <ul id="right-list">
                <!-- Elementy zostaną tu dodane -->
            </ul>
        </div>
    </div>
</div>


</body>

</html>
